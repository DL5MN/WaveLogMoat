name: "\U0001F4A1 Feature Request"
description: Suggest a new feature or improvement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please search [existing issues](https://github.com/dl5mn/WaveLogMate/issues?q=is%3Aissue+label%3Aenhancement) before filing a new one.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What's your use case?
      placeholder: "I'm always frustrated when…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
      placeholder: "It would be great if…"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - QSO logging
        - WSJT-X connection
        - Wavelog connection
        - Menu bar / UI
        - Settings
        - Notifications
        - Auto-updates
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to related projects, or anything else.

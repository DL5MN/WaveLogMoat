name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install Tools
        run: brew install swiftlint git-cliff

      - name: Lint
        run: swiftlint lint --strict

      - name: Run Tests
        run: swift test

      - name: Import Code Signing Certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Archive Release (unsigned)
        run: >
          xcodebuild -project WaveLogMoat.xcodeproj
          -scheme WaveLogMoat
          -configuration Release
          -destination 'platform=macOS'
          -archivePath build/WaveLogMoat.xcarchive
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          archive

      - name: Sign App
        run: |
          APP_PATH="build/WaveLogMoat.xcarchive/Products/Applications/WaveLogMoat.app"
          ENTITLEMENTS="WaveLogMoat.entitlements"

          # Sign frameworks and helpers first, then the app bundle
          find "$APP_PATH/Contents/Frameworks" -type f -perm +111 -o -name "*.dylib" | while read -r binary; do
            codesign --force --timestamp --options runtime \
              --sign "Developer ID Application" "$binary"
          done

          find "$APP_PATH/Contents/Frameworks" -name "*.framework" | while read -r framework; do
            codesign --force --timestamp --options runtime \
              --sign "Developer ID Application" "$framework"
          done

          codesign --force --timestamp --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "Developer ID Application" "$APP_PATH"

          # Verify
          codesign --verify --deep --strict "$APP_PATH"

      - name: Get Version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP_PATH="build/WaveLogMoat.xcarchive/Products/Applications/WaveLogMoat.app"
          ZIP_PATH="$RUNNER_TEMP/WaveLogMoat-notarize.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package DMG
        run: |
          APP_NAME="WaveLogMoat"
          APP_PATH="build/WaveLogMoat.xcarchive/Products/Applications/${APP_NAME}.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not locate ${APP_NAME}.app at $APP_PATH"
            exit 1
          fi
          mkdir -p dist/stage
          ditto "$APP_PATH" "dist/stage/${APP_NAME}.app"
          hdiutil create -volname "$APP_NAME" -srcfolder "dist/stage" -ov -format UDZO "dist/${APP_NAME}-${GITHUB_REF_NAME}.dmg"

      - name: Compute DMG SHA256
        id: sha
        run: echo "SHA256=$(shasum -a 256 dist/WaveLogMoat-${GITHUB_REF_NAME}.dmg | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Check optional secrets
        id: secrets
        run: |
          if [ -n "${{ secrets.SPARKLE_PRIVATE_KEY }}" ]; then echo "has_sparkle=true" >> $GITHUB_OUTPUT; fi
          if [ -n "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]; then echo "has_homebrew=true" >> $GITHUB_OUTPUT; fi

      - name: Sign DMG for Sparkle
        id: sparkle
        if: steps.secrets.outputs.has_sparkle == 'true'
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DMG_PATH="dist/WaveLogMoat-${GITHUB_REF_NAME}.dmg"
          SIGN_OUTPUT=$(echo "$SPARKLE_KEY" | .build/artifacts/sparkle/Sparkle/bin/sign_update "$DMG_PATH" --ed-key-file -)
          echo "SIGNATURE=${SIGN_OUTPUT}" >> $GITHUB_OUTPUT

      - name: Update Appcast
        if: steps.sparkle.outcome == 'success'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH="build/WaveLogMoat.xcarchive/Products/Applications/WaveLogMoat.app"
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$APP_PATH/Contents/Info.plist")
          DMG_PATH="dist/WaveLogMoat-${GITHUB_REF_NAME}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          DOWNLOAD_URL="https://github.com/dl5mn/WaveLogMoat/releases/download/${GITHUB_REF_NAME}/WaveLogMoat-${GITHUB_REF_NAME}.dmg"

          mkdir -p docs
          cat > docs/appcast.xml << EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/" version="2.0">
            <channel>
              <title>WaveLogMoat</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure url="${DOWNLOAD_URL}" ${{ steps.sparkle.outputs.SIGNATURE }} type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF

      - name: Generate Release Notes
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: WaveLogMoat ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          files: dist/WaveLogMoat-${{ github.ref_name }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Appcast to GitHub Pages
        if: steps.sparkle.outcome == 'success'
        run: |
          git config user.name "DL5MN"
          git config user.email "dl5mn@users.noreply.github.com"

          if git fetch origin gh-pages 2>/dev/null; then
            git worktree add /tmp/gh-pages gh-pages
          else
            git worktree add --detach /tmp/gh-pages
            git -C /tmp/gh-pages checkout --orphan gh-pages
            git -C /tmp/gh-pages rm -rf .
          fi

          cp docs/appcast.xml /tmp/gh-pages/appcast.xml
          cd /tmp/gh-pages
          git add appcast.xml
          git diff --cached --quiet && echo "No appcast changes" || (git commit -m "update appcast for ${GITHUB_REF_NAME}" && git push origin gh-pages)

      - name: Clean Up Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Update Homebrew Tap
        if: steps.secrets.outputs.has_homebrew == 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="${{ steps.sha.outputs.SHA256 }}"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/dl5mn/homebrew-wavelogmoat.git /tmp/tap
          cd /tmp/tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/wavelogmoat.rb
          sed -i '' "s/sha256 .*/sha256 \"${SHA256}\"/" Casks/wavelogmoat.rb

          git config user.name "DL5MN"
          git config user.email "dl5mn@users.noreply.github.com"
          git add Casks/wavelogmoat.rb
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "bump: WaveLogMoat ${VERSION}" && git push)

name: Build & Test

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Format
        run: |
          make format
          git diff --exit-code || { echo "::error::Code is not formatted. Run 'make format' locally."; exit 1; }

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build (Xcode)
        run: make app

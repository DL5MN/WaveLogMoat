name: WaveLogMate
options:
  deploymentTarget:
    macOS: "14.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.5.0
targets:
  WaveLogMate:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/WaveLogMate
    dependencies:
      - package: Sparkle
        product: Sparkle
    info:
      path: Sources/WaveLogMate/Info.plist
      properties:
        CFBundleDisplayName: WaveLogMate
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "8"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        SUFeedURL: "https://dl5mn.github.io/WaveLogMate/appcast.xml"
        SUPublicEDKey: "Rpryv9ry5XZedQXt2w1hTetQP3dB0dM67TqmT0T1XZA="
    entitlements:
      path: WaveLogMate.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.dl5mn.WaveLogMate
        PRODUCT_NAME: WaveLogMate
        SWIFT_VERSION: 6.2
        MACOSX_DEPLOYMENT_TARGET: 14.0
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
  WaveLogMateTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/WaveLogMateTests
    dependencies:
      - target: WaveLogMate
    settings:
      base:
        SWIFT_VERSION: 6.2
        MACOSX_DEPLOYMENT_TARGET: 14.0
